env:
  contexts:
  - excludePaths: []
    name: baseline
    urls:
    - http://juice-shop:3000
  parameters:
    failOnError: true
    progressToStdout: false
jobs:
- parameters:
    enableTags: false
    maxAlertsPerRule: 10
  type: passiveScan-config
- parameters:
    maxDuration: 1
    url: http://juice-shop:3000
  type: spider
- parameters:
    maxDuration: 3
  type: passiveScan-wait
- parameters:
    format: Long
    summaryFile: /home/zap/zap_out.json
  rules: []
  type: outputSummary
- parameters:
    reportDescription: ''
    reportDir: /zap/wrk/
    reportFile: mixed-zap-20260419T111356Z-330-20260419T111356Z.html
    reportTitle: ZAP Scanning Report
    template: traditional-html
  type: report
- parameters:
    reportDescription: ''
    reportDir: /zap/wrk/
    reportFile: mixed-zap-20260419T111356Z-330-20260419T111356Z.md
    reportTitle: ZAP Scanning Report
    template: traditional-md
  type: report
- parameters:
    reportDescription: ''
    reportDir: /zap/wrk/
    reportFile: mixed-zap-20260419T111356Z-330-20260419T111356Z.json
    reportTitle: ZAP Scanning Report
    template: traditional-json
  type: report
